<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KhataPro Cloud</title>
    <!-- 1. External Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body>
    <div id="root">
        <!-- This shows if JavaScript fails to load -->
        <div style="padding: 20px; text-align: center;">Loading Application... If this stays, check your API Keys.</div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- 2. CONFIGURATION (REPLACE THESE) ---
        const S_URL = "burfpzxdlyiiwdzewefs"; 
        const S_KEY = "sb_publishable_jjUNoUOeM-_3t8C6a9A5Gw_8Jgxnq1T";

        // Initialize Supabase correctly
        const _supabase = window.supabase.createClient(S_URL, S_KEY);

        const App = () => {
            const [customers, setCustomers] = useState([]);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [view, setView] = useState('dashboard');
            const [selectedCustId, setSelectedCustId] = useState(null);

            useEffect(() => {
                fetchData();
            }, []);

            async function fetchData() {
                try {
                    setLoading(true);
                    const { data, error: sbError } = await _supabase
                        .from('customers')
                        .select('*, transactions(*)');
                    
                    if (sbError) throw sbError;
                    setCustomers(data || []);
                } catch (err) {
                    setError(err.message);
                } finally {
                    setLoading(false);
                    // Refresh icons after data loads
                    setTimeout(() => lucide.createIcons(), 500);
                }
            }

            const addCustomer = async (name, phone) => {
                const { error } = await _supabase
                    .from('customers')
                    .insert([{ name, phone }]);
                if (error) alert("Error: " + error.message);
                else { fetchData(); setView('dashboard'); }
            };

            const addTransaction = async (customerId, type, amount, note) => {
                const { error } = await _supabase
                    .from('transactions')
                    .insert([{ customer_id: customerId, type, amount: parseFloat(amount), note }]);
                if (error) alert("Error: " + error.message);
                else fetchData();
            };

            const totals = useMemo(() => {
                return customers.reduce((acc, curr) => {
                    const bal = curr.transactions?.reduce((s, t) => t.type === 'CREDIT' ? s + Number(t.amount) : s - Number(t.amount), 0) || 0;
                    return acc + bal;
                }, 0);
            }, [customers]);

            if (error) return <div class="p-10 text-red-500">Error Connection: {error}<br/>Check if URL/Key is correct and RLS is off.</div>;
            if (loading) return <div class="h-screen flex items-center justify-center font-bold text-indigo-600">Connecting to Cloud...</div>;

            const selectedCustomer = customers.find(c => c.id === selectedCustId);

            return (
                <div class="max-w-md mx-auto min-h-screen flex flex-col pb-20">
                    <header class="bg-indigo-700 text-white p-6 rounded-b-3xl shadow-lg">
                        <div class="flex justify-between items-center mb-4">
                            <h1 class="text-2xl font-bold">KhataPro</h1>
                            <button onClick={() => setView('add')} class="bg-white/20 p-2 rounded-full">
                                <i data-lucide="user-plus"></i>
                            </button>
                        </div>
                        <div class="bg-white/10 p-4 rounded-2xl text-center">
                            <p class="text-indigo-100 text-xs uppercase font-semibold">Total Udhar</p>
                            <h2 class="text-3xl font-bold">₹ {totals.toLocaleString()}</h2>
                        </div>
                    </header>

                    <main class="flex-1 p-4">
                        {view === 'dashboard' && (
                            <div class="space-y-3">
                                {customers.length === 0 && <p class="text-center text-gray-400 mt-10">No customers yet. Add one!</p>}
                                {customers.map(cust => {
                                    const balance = cust.transactions?.reduce((s, t) => t.type === 'CREDIT' ? s + Number(t.amount) : s - Number(t.amount), 0) || 0;
                                    return (
                                        <div key={cust.id} onClick={() => { setSelectedCustId(cust.id); setView('detail'); }} class="bg-white p-4 rounded-2xl shadow-sm border flex justify-between items-center active:bg-gray-50">
                                            <div><h3 class="font-bold">{cust.name}</h3><p class="text-sm text-gray-500">{cust.phone}</p></div>
                                            <p class={`font-bold ${balance > 0 ? 'text-red-500' : 'text-emerald-500'}`}>₹ {balance}</p>
                                        </div>
                                    )
                                })}
                            </div>
                        )}

                        {view === 'detail' && selectedCustomer && (
                            <CustomerDetail 
                                customer={selectedCustomer} 
                                onBack={() => setView('dashboard')} 
                                onAddTx={addTransaction}
                            />
                        )}

                        {view === 'add' && (
                            <AddCustomer onBack={() => setView('dashboard')} onSave={addCustomer} />
                        )}
                    </main>
                </div>
            );
        };

        const CustomerDetail = ({ customer, onBack, onAddTx }) => {
            const balance = customer.transactions?.reduce((s, t) => t.type === 'CREDIT' ? s + Number(t.amount) : s - Number(t.amount), 0) || 0;
            const handleTx = async (type) => {
                const amt = prompt(`Enter ${type} amount:`);
                if (!amt || isNaN(amt)) return;
                const note = prompt("Enter Note (optional):") || "";
                await onAddTx(customer.id, type, amt, note);
            };

            return (
                <div class="animate-in slide-in-from-right duration-200">
                    <button onClick={onBack} class="mb-4 text-indigo-600 font-bold flex items-center gap-1">← Back</button>
                    <div class="bg-white p-6 rounded-3xl shadow-sm border mb-4 text-center">
                        <h2 class="text-2xl font-bold">{customer.name}</h2>
                        <p class="text-sm text-gray-500">{customer.phone}</p>
                        <p class={`text-3xl font-bold mt-4 ${balance > 0 ? 'text-red-600' : 'text-emerald-600'}`}>₹ {balance}</p>
                        <div class="flex gap-2 mt-6">
                            <button onClick={() => handleTx('CREDIT')} class="flex-1 bg-red-600 text-white py-4 rounded-xl font-bold">GIVE UDHAR</button>
                            <button onClick={() => handleTx('PAYMENT')} class="flex-1 bg-emerald-600 text-white py-4 rounded-xl font-bold">GOT PAID</button>
                        </div>
                    </div>
                </div>
            );
        };

        const AddCustomer = ({ onBack, onSave }) => {
            const [n, setN] = useState('');
            const [p, setP] = useState('');
            return (
                <div class="bg-white p-6 rounded-3xl shadow-lg border">
                    <h2 class="text-xl font-bold mb-4">Add New Customer</h2>
                    <input type="text" placeholder="Customer Name" class="w-full p-4 mb-3 bg-gray-50 rounded-xl border" onChange={e => setN(e.target.value)} />
                    <input type="text" placeholder="Phone Number" class="w-full p-4 mb-5 bg-gray-50 rounded-xl border" onChange={e => setP(e.target.value)} />
                    <button onClick={() => onSave(n, p)} class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold shadow-lg">Save to Ledger</button>
                    <button onClick={onBack} class="w-full mt-2 text-gray-400 py-2">Cancel</button>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
