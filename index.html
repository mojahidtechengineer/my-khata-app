<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KhataPro Cloud | Digital Ledger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- 1. CONFIGURATION ---
        const S_URL = "https://burfpzxdlyiiwdzewefs.supabase.co"; 
        const S_KEY = "sb_publishable_jjUNoUOeM-_3t8C6a9A5Gw_8Jgxnq1T";
        const SHOP_PIN = "1234"; 

        const _supabase = window.supabase.createClient(S_URL, S_KEY);

        const App = () => {
            const [isLocked, setIsLocked] = useState(true);
            const [customers, setCustomers] = useState([]);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [view, setView] = useState('dashboard');
            const [selectedCustId, setSelectedCustId] = useState(null);

            useEffect(() => {
                fetchData();
            }, []);

            async function fetchData() {
                try {
                    setLoading(true);
                    const { data, error: sbError } = await _supabase
                        .from('customers')
                        .select('*, transactions(*)');
                    if (sbError) throw sbError;
                    setCustomers(data || []);
                } catch (err) {
                    setError(err.message);
                } finally {
                    setLoading(false);
                    setTimeout(() => lucide.createIcons(), 500);
                }
            }

            const addCustomer = async (name, phone) => {
                if(!name || !phone) return alert("Enter Name and Phone");
                const { error } = await _supabase.from('customers').insert([{ name, phone }]);
                if (error) alert(error.message);
                else { fetchData(); setView('dashboard'); }
            };

            const addTransaction = async (customerId, type, amount, note) => {
                const { error } = await _supabase.from('transactions').insert([
                    { customer_id: customerId, type, amount: parseFloat(amount), note }
                ]);
                if (error) alert(error.message);
                else fetchData();
            };

            const totals = useMemo(() => {
                return customers.reduce((acc, curr) => {
                    const bal = curr.transactions?.reduce((s, t) => t.type === 'CREDIT' ? s + Number(t.amount) : s - Number(t.amount), 0) || 0;
                    return acc + bal;
                }, 0);
            }, [customers]);

            if (isLocked) {
                return (
                    <div class="h-screen flex flex-col items-center justify-center bg-indigo-700 p-8 text-white text-center">
                        <div class="bg-white/10 p-8 rounded-[40px] border border-white/20 w-full max-w-xs shadow-2xl">
                            <h1 class="text-2xl font-bold mb-8">Shop Ledger PIN</h1>
                            <input 
                                type="password" 
                                maxlength="4"
                                placeholder="----"
                                class="w-full p-4 rounded-2xl text-black text-center text-3xl font-bold tracking-[15px] outline-none"
                                onChange={(e) => {
                                    if(e.target.value === SHOP_PIN) {
                                        setIsLocked(false);
                                        setTimeout(() => lucide.createIcons(), 100);
                                    }
                                }}
                            />
                        </div>
                    </div>
                );
            }

            if (error) return <div class="p-10 text-red-500 text-center font-bold">Connection Error: {error}<br/><br/>Check your Supabase Keys!</div>;
            if (loading) return <div class="h-screen flex items-center justify-center font-bold text-indigo-600">Loading Khata...</div>;

            const selectedCustomer = customers.find(c => c.id === selectedCustId);

            return (
                <div class="max-w-md mx-auto min-h-screen flex flex-col">
                    <header class="bg-indigo-700 text-white p-6 rounded-b-[40px] shadow-lg">
                        <div class="flex justify-between items-center mb-6">
                            <h1 class="text-xl font-bold">MyDigitalKhata</h1>
                            <button onClick={() => setView('add')} class="bg-white/20 p-2 rounded-xl"><i data-lucide="plus"></i></button>
                        </div>
                        <div class="bg-white/10 p-4 rounded-2xl">
                            <p class="text-xs uppercase opacity-70">Total Pending</p>
                            <h2 class="text-3xl font-bold">₹ {totals.toLocaleString()}</h2>
                        </div>
                    </header>

                    <main class="flex-1 p-4 pb-10">
                        {view === 'dashboard' && (
                            <div class="space-y-3">
                                {customers.map(cust => {
                                    const bal = cust.transactions?.reduce((s, t) => t.type === 'CREDIT' ? s + Number(t.amount) : s - Number(t.amount), 0) || 0;
                                    return (
                                        <div key={cust.id} onClick={() => { setSelectedCustId(cust.id); setView('detail'); }} class="bg-white p-4 rounded-2xl shadow-sm border flex justify-between items-center active:bg-gray-100">
                                            <div>
                                                <h3 class="font-bold text-gray-800">{cust.name}</h3>
                                                <p class="text-xs text-gray-400">{cust.phone}</p>
                                            </div>
                                            <p class={`font-bold ${bal > 0 ? 'text-red-500' : 'text-green-500'}`}>₹ {bal}</p>
                                        </div>
                                    )
                                })}
                            </div>
                        )}

                        {view === 'detail' && selectedCustomer && (
                            <div class="animate-in slide-in-from-right duration-200">
                                <button onClick={() => setView('dashboard')} class="mb-4 text-indigo-600 font-bold">← Back</button>
                                <div class="bg-white p-6 rounded-3xl shadow-sm border mb-6 text-center">
                                    <h2 class="text-2xl font-bold">{selectedCustomer.name}</h2>
                                    <div class="flex gap-2 mt-4">
                                        <button onClick={() => {
                                            const amt = prompt("Credit Amount?");
                                            if(amt) addTransaction(selectedCustomer.id, 'CREDIT', amt, 'Added Udhar');
                                        }} class="flex-1 bg-red-50 text-red-600 py-3 rounded-xl font-bold border border-red-100">+ UDHAR</button>
                                        <button onClick={() => {
                                            const amt = prompt("Payment Amount?");
                                            if(amt) addTransaction(selectedCustomer.id, 'PAYMENT', amt, 'Got Payment');
                                        }} class="flex-1 bg-green-50 text-green-600 py-3 rounded-xl font-bold border border-green-100">- PAID</button>
                                    </div>
                                    <button onClick={() => {
                                        const bal = selectedCustomer.transactions?.reduce((s, t) => t.type === 'CREDIT' ? s + Number(t.amount) : s - Number(t.amount), 0) || 0;
                                        window.open(`https://wa.me/${selectedCustomer.phone}?text=Namaste, your pending balance is ₹${bal}.`);
                                    }} class="w-full mt-3 bg-green-500 text-white py-3 rounded-xl font-bold flex items-center justify-center gap-2">
                                        <i data-lucide="message-circle"></i> Send WhatsApp Reminder
                                    </button>
                                </div>
                                <h3 class="text-xs font-bold text-gray-400 uppercase ml-2 mb-2">History</h3>
                                <div class="space-y-2">
                                    {selectedCustomer.transactions?.map(t => (
                                        <div key={t.id} class="bg-white p-3 rounded-xl flex justify-between border text-sm">
                                            <span>{new Date(t.created_at).toLocaleDateString()}</span>
                                            <span class={t.type === 'CREDIT' ? 'text-red-500 font-bold' : 'text-green-500 font-bold'}>
                                                {t.type === 'CREDIT' ? '+' : '-'} ₹{t.amount}
                                            </span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {view === 'add' && (
                            <div class="bg-white p-6 rounded-3xl shadow-lg border">
                                <h2 class="text-xl font-bold mb-4">New Customer</h2>
                                <input type="text" id="n" placeholder="Name" class="w-full p-4 mb-2 bg-gray-50 rounded-xl border" />
                                <input type="text" id="p" placeholder="Phone (91...)" class="w-full p-4 mb-4 bg-gray-50 rounded-xl border" />
                                <button onClick={() => addCustomer(document.getElementById('n').value, document.getElementById('p').value)} class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold">Save Customer</button>
                                <button onClick={() => setView('dashboard')} class="w-full mt-2 text-gray-400">Cancel</button>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
